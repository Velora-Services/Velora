<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="VELORA — Egypt's premier marketplace connecting clients with elite event professionals. Always free for customers.">
<meta name="robots" content="index, follow">
<meta name="author" content="VELORA">
<title>VELORA — Find Your Perfect Professional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ========== DESIGN SYSTEM ========== */
:root {
  --color-bg-primary: #FFF8F0;
  --color-bg-secondary: #FEF5E8;
  --color-bg-card: #FFFFFF;
  --color-gold-light: #E8C99E;
  --color-gold: #D4B483;
  --color-gold-deep: #C6A15B;
  --color-blush: #FADADD;
  --color-blush-soft: #FEF0F2;
  --color-sage: #9BB0A1;
  --color-text-dark: #2C2C2C;
  --color-text-medium: #4A4A4A;
  --color-text-light: #6B5E5A;
  --color-border: #D6CBC7;
  --color-white: #FFFFFF;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 16px 40px rgba(0,0,0,0.12);
  --shadow-hover: 0 20px 40px rgba(0,0,0,0.12);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-xl: 40px;
  --radius-full: 9999px;
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-arabic: 'Tajawal', sans-serif;
  --transition-fast: 0.2s ease;
  --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 90px; }
body {
  background: var(--color-bg-primary);
  color: var(--color-text-dark);
  font-family: var(--font-sans);
  line-height: 1.6;
  overflow-x: hidden;
}
html[dir="rtl"] { direction: rtl; }
html[lang="ar"] body, html[lang="ar"] button, html[lang="ar"] input,
html[lang="ar"] textarea, html[lang="ar"] select { font-family: var(--font-arabic); }
html[lang="ar"] h1, html[lang="ar"] h2, html[lang="ar"] h3, html[lang="ar"] .logo {
  font-family: var(--font-serif);
}

/* Navigation */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 4rem; background: rgba(255,248,240,0.95);
  backdrop-filter: blur(10px); transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
#navbar.solid { padding: 0.8rem 4rem; background: var(--color-bg-primary); box-shadow: var(--shadow-md); }
.logo { font-size: 1.8rem; font-weight: 700; color: var(--color-text-dark); text-decoration: none; cursor: pointer; font-family: var(--font-serif); }
.logo span { color: var(--color-gold-deep); }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { text-decoration: none; color: var(--color-text-light); font-weight: 500; font-size: 0.9rem; transition: var(--transition-fast); cursor: pointer; position: relative; }
.nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--color-gold-deep); transition: var(--transition-fast); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover, .nav-links a.active { color: var(--color-gold-deep); }
.nav-cta { display: flex; gap: 1rem; align-items: center; }
.lang-switcher { background: transparent; border: 1px solid var(--color-gold); color: var(--color-gold-deep); padding: 0.5rem 1rem; border-radius: var(--radius-full); font-size: 0.8rem; cursor: pointer; transition: var(--transition-fast); }
.lang-switcher:hover { background: var(--color-gold); color: var(--color-text-dark); }
.btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.6rem; border-radius: var(--radius-full); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: var(--transition); border: none; text-decoration: none; }
.btn-outline { background: transparent; border: 1px solid var(--color-gold-deep); color: var(--color-gold-deep); }
.btn-outline:hover { background: var(--color-gold); transform: translateY(-2px); }
.btn-primary { background: var(--color-gold-deep); color: var(--color-white); box-shadow: var(--shadow-sm); }
.btn-primary:hover { background: var(--color-gold); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.btn-large { padding: 1rem 2.5rem; font-size: 1rem; }
.nav-ham { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; }
.nav-ham span { width: 24px; height: 2px; background: var(--color-text-dark); transition: var(--transition-fast); }
#mobile-menu { position: fixed; inset: 0; background: var(--color-bg-primary); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; opacity: 0; pointer-events: none; transition: var(--transition); }
#mobile-menu.open { opacity: 1; pointer-events: all; }
#mobile-menu a { font-size: 1.5rem; text-decoration: none; color: var(--color-text-dark); font-family: var(--font-serif); cursor: pointer; }
.mob-close { position: absolute; top: 2rem; right: 2rem; font-size: 1.5rem; background: none; border: none; cursor: pointer; }

/* Hero */
.hero { min-height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; padding: 8rem 2rem 4rem; background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-blush-soft) 100%); overflow: hidden; }
.hero-inner { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; }
.hero-badge { display: inline-block; background: rgba(198,161,91,0.15); padding: 0.5rem 1.2rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 500; color: var(--color-gold-deep); margin-bottom: 2rem; }
.hero-title { font-size: clamp(2.5rem,6vw,4.5rem); line-height: 1.1; margin-bottom: 1.5rem; color: var(--color-text-dark); font-family: var(--font-serif); }
.hero-title em { color: var(--color-gold-deep); display: block; font-style: italic; }
.hero-desc { font-size: 1.1rem; color: var(--color-text-light); max-width: 600px; margin: 0 auto 2rem; }
.hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

/* Sections */
.section-header { text-align: center; margin-bottom: 3rem; }
.section-tag { display: inline-block; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--color-gold-deep); background: rgba(198,161,91,0.1); padding: 0.3rem 1rem; border-radius: var(--radius-full); margin-bottom: 1rem; }
.section-title { font-size: clamp(2rem,4vw,3rem); margin-bottom: 1rem; font-family: var(--font-serif); color: var(--color-text-dark); }
.section-title em { color: var(--color-gold-deep); font-style: italic; }
.gold-rule { width: 44px; height: 1px; background: var(--color-gold-deep); margin: 1.5rem 0; }
.categories-section, .howitworks-section, .providers-section, .occasions-section, .trust-section, .testimonials-section, .provider-cta-section, .pricing-section { padding: 5rem 4rem; }
.categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-top: 2rem; }
.category-card { background: var(--color-white); padding: 1.5rem; text-align: center; border-radius: var(--radius-md); transition: var(--transition); cursor: pointer; box-shadow: var(--shadow-sm); }
.category-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); background: var(--color-gold); }
.category-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.category-name { font-weight: 600; font-size: 0.9rem; }

/* How It Works */
.hiw-tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; border-bottom: 1px solid var(--color-border); }
.hiw-tab { padding: 0.8rem 2rem; background: none; border: none; font-size: 0.9rem; font-weight: 600; color: var(--color-text-light); cursor: pointer; transition: var(--transition-fast); border-bottom: 2px solid transparent; }
.hiw-tab.active { color: var(--color-gold-deep); border-bottom-color: var(--color-gold-deep); }
.hiw-pane { display: none; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.hiw-pane.active { display: grid; }
.hiw-steps { display: flex; flex-direction: column; gap: 1.5rem; }
.hiw-step { display: flex; gap: 1.5rem; padding: 1rem 0; border-bottom: 1px solid var(--color-border); }
.step-num { font-size: 2rem; font-weight: 600; color: var(--color-gold-deep); font-family: var(--font-serif); width: 60px; }
.step-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
.step-desc { color: var(--color-text-light); font-size: 0.9rem; }
.hiw-visual { background: var(--color-white); padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
.hiw-visual-title { font-size: 1.5rem; font-weight: 600; color: var(--color-gold-deep); margin-bottom: 1.5rem; font-family: var(--font-serif); }
.checklist { display: flex; flex-direction: column; gap: 0.8rem; }
.check-item { display: flex; align-items: center; gap: 0.8rem; font-size: 0.9rem; }
.check-dot { width: 20px; height: 20px; background: var(--color-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; }

/* Providers Grid */
.filters { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
.filter-btn { padding: 0.5rem 1.2rem; border-radius: var(--radius-full); background: var(--color-white); border: 1px solid var(--color-border); color: var(--color-text-light); font-size: 0.85rem; cursor: pointer; transition: var(--transition-fast); }
.filter-btn:hover, .filter-btn.active { background: var(--color-gold-deep); border-color: var(--color-gold-deep); color: var(--color-white); }
.providers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
.provider-card { background: var(--color-white); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: var(--transition); cursor: pointer; }
.provider-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
.provider-img { height: 220px; background: var(--color-sage-soft); display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; }
.provider-badge { position: absolute; top: 1rem; left: 1rem; background: var(--color-gold-deep); padding: 0.2rem 0.8rem; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 600; color: white; }
.provider-info { padding: 1.5rem; }
.provider-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.3rem; font-family: var(--font-serif); }
.provider-type { color: var(--color-gold-deep); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.provider-location { font-size: 0.8rem; color: var(--color-text-light); margin-bottom: 0.5rem; }
.provider-stars { color: var(--color-gold); margin-bottom: 0.5rem; }
.provider-price { font-weight: 600; margin-top: 0.5rem; }
.provider-price span { color: var(--color-gold-deep); font-size: 1.1rem; }
.btn-book { width: 100%; margin-top: 1rem; padding: 0.7rem; background: transparent; border: 1px solid var(--color-gold-deep); border-radius: var(--radius-full); color: var(--color-gold-deep); font-weight: 600; cursor: pointer; transition: var(--transition-fast); }
.btn-book:hover { background: var(--color-gold-deep); color: white; }

/* Occasions */
.occasions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--color-border); margin-top: 2rem; }
.occ-card { background: var(--color-white); padding: 2rem; text-align: center; transition: var(--transition); cursor: pointer; }
.occ-card:hover { background: var(--color-gold-light); transform: translateY(-3px); }
.occ-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.occ-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
.occ-desc { font-size: 0.8rem; color: var(--color-text-light); margin-bottom: 1rem; }
.occ-link { color: var(--color-gold-deep); text-decoration: none; font-size: 0.8rem; font-weight: 600; }

/* Trust */
.trust-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.trust-points { display: flex; flex-direction: column; gap: 1.5rem; }
.trust-pt { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--color-border); }
.trust-icon { width: 45px; height: 45px; background: var(--color-blush-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.trust-label { font-weight: 600; margin-bottom: 0.3rem; color: var(--color-gold-deep); font-size: 0.8rem; text-transform: uppercase; }
.trust-text { font-size: 0.85rem; color: var(--color-text-light); }
.trust-visual { position: relative; }
.trust-big { font-size: 8rem; font-weight: 700; color: rgba(198,161,91,0.1); position: absolute; top: -2rem; right: -1rem; font-family: var(--font-serif); }
.trust-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
.trust-stat { background: var(--color-white); padding: 1.5rem; text-align: center; }
.trust-stat-n { font-size: 2rem; font-weight: 700; color: var(--color-gold-deep); font-family: var(--font-serif); }
.trust-stat-l { font-size: 0.7rem; text-transform: uppercase; color: var(--color-text-light); }
.trust-quote { margin-top: 1rem; background: var(--color-white); padding: 1.5rem; border-radius: var(--radius-md); text-align: center; border: 1px solid var(--color-border); }

/* Testimonials */
.testimonial-slider { overflow: hidden; position: relative; }
.testimonial-track { display: flex; gap: 2rem; transition: transform 0.5s ease; }
.testimonial-card { background: var(--color-white); padding: 2rem; border-radius: var(--radius-lg); min-width: calc(33.33% - 1.33rem); box-shadow: var(--shadow-sm); }
.testimonial-stars { color: var(--color-gold); margin-bottom: 1rem; }
.testimonial-quote { font-size: 1rem; font-style: italic; margin-bottom: 1rem; color: var(--color-text-medium); }
.testimonial-name { font-weight: 600; }
.testimonial-sub { font-size: 0.8rem; color: var(--color-text-light); }
.testimonial-nav { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
.testimonial-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--color-white); border: 1px solid var(--color-border); cursor: pointer; transition: var(--transition-fast); }
.testimonial-btn:hover { background: var(--color-gold-deep); border-color: var(--color-gold-deep); color: white; }

/* Provider CTA */
.pcta-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.pcta-box { background: var(--color-white); padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
.pcta-title { font-size: 1.3rem; font-weight: 600; color: var(--color-gold-deep); margin-bottom: 1rem; font-family: var(--font-serif); }
.pcta-list { display: flex; flex-direction: column; gap: 0.8rem; }
.pcta-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0; border-bottom: 1px solid var(--color-border); font-size: 0.85rem; }
.pcta-dot { color: var(--color-gold-deep); font-weight: bold; }

/* Plans */
.plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 2rem; }
.plan-card { background: var(--color-white); padding: 2rem; border-radius: var(--radius-lg); text-align: center; position: relative; box-shadow: var(--shadow-sm); transition: var(--transition); }
.plan-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
.plan-card.popular { border: 2px solid var(--color-gold-deep); background: var(--color-bg-primary); }
.plan-popular-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--color-gold-deep); color: white; padding: 0.2rem 1rem; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
.plan-name { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-light); margin-bottom: 1rem; }
.plan-price { font-size: 2.5rem; font-weight: 700; color: var(--color-gold-deep); font-family: var(--font-serif); }
.plan-period { font-size: 0.7rem; color: var(--color-text-light); margin-bottom: 1.5rem; }
.plan-feats { margin: 1.5rem 0; display: flex; flex-direction: column; gap: 0.5rem; }
.plan-feat { font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
.plan-feat-dot { color: var(--color-gold-deep); }
.plan-note { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--color-text-light); }

/* Forms */
.page-form { padding: 8rem 4rem 5rem; background: var(--color-bg-primary); display: none; }
.page-form.active { display: block; }
.page-header { text-align: center; margin-bottom: 3rem; }
.form-container { max-width: 800px; margin: 0 auto; }
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; }
.form-group.full { grid-column: span 2; }
.form-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-light); }
.form-input, .form-select, .form-textarea { padding: 0.9rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: inherit; transition: var(--transition-fast); background: var(--color-white); width: 100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--color-gold-deep); box-shadow: 0 0 0 3px rgba(198,161,91,0.1); }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem; }
.checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }
.checkbox-item input { width: 18px; height: 18px; accent-color: var(--color-gold-deep); cursor: pointer; }
.checkbox-row { display: flex; align-items: flex-start; gap: 0.8rem; }
.checkbox-row input { width: 18px; height: 18px; margin-top: 0.2rem; accent-color: var(--color-gold-deep); }
.checkbox-row label { font-size: 0.8rem; color: var(--color-text-light); }
.checkbox-row label a { color: var(--color-gold-deep); text-decoration: none; cursor: pointer; }
.form-submit { text-align: center; margin-top: 2rem; }
.success-msg { display: none; background: rgba(155,176,161,0.1); border: 1px solid var(--color-sage); padding: 1.5rem; border-radius: var(--radius-md); text-align: center; margin-top: 2rem; }
.success-msg.show { display: block; }
.success-msg h3 { color: var(--color-sage); margin-bottom: 0.5rem; }

/* Contact */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; max-width: 1100px; margin: 0 auto; }
.contact-item { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
.contact-icon { width: 45px; height: 45px; background: var(--color-white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--color-gold-deep); border: 1px solid var(--color-border); }
.contact-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-gold-deep); }
.contact-val { font-size: 0.9rem; }
.contact-val a { color: var(--color-text-dark); text-decoration: none; }
.social-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
.social-link { padding: 0.5rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-full); text-decoration: none; color: var(--color-text-light); font-size: 0.8rem; transition: var(--transition-fast); display: inline-flex; align-items: center; gap: 0.5rem; }
.social-link:hover { background: var(--color-gold-deep); border-color: var(--color-gold-deep); color: white; }

/* Terms */
.page-terms { padding: 8rem 4rem 5rem; display: none; }
.page-terms.active { display: block; }
.terms-container { max-width: 900px; margin: 0 auto; }
.terms-section { margin-bottom: 2.5rem; }
.terms-section h3 { font-size: 1.5rem; font-family: var(--font-serif); margin-bottom: 1rem; color: var(--color-text-dark); border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem; }
.terms-section p, .terms-section ul { margin-bottom: 1rem; color: var(--color-text-light); line-height: 1.8; }
.terms-section ul { padding-left: 1.5rem; }
.legal-highlight { background: rgba(198,161,91,0.05); border-left: 3px solid var(--color-gold-deep); padding: 1rem 1.5rem; margin: 1rem 0; border-radius: var(--radius-sm); }

/* Modal */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 2rem; overflow-y: auto; }
.modal.active { display: flex; }
.modal-content { max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; background: var(--color-white); border-radius: var(--radius-lg); position: relative; animation: modalFadeIn 0.3s ease; }
@keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
.modal-close { position: sticky; top: 1rem; right: 1rem; float: right; background: var(--color-white); border: none; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-sm); margin: 1rem; z-index: 10; }
.modal-header { padding: 2rem; background: var(--color-blush-soft); display: flex; gap: 2rem; flex-wrap: wrap; }
.modal-avatar { width: 100px; height: 100px; background: var(--color-sage-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
.modal-title h2 { font-size: 1.8rem; margin-bottom: 0.3rem; font-family: var(--font-serif); }
.modal-body { padding: 2rem; }

    e.preventDefault();
    await submitQuickBooking(provider);

async function submitQuickBooking(provider) {
  const btn = document.querySelector('#quickForm button');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const data = {
      client_name: document.getElementById('qbName').value,
      client_email: document.getElementById('qbEmail').value,
      client_phone: document.getElementById('qbPhone').value,
      event_date: document.getElementById('qbDate').value,
      event_location: document.getElementById('qbLocation').value,
      provider: provider.name,
      professional_id: provider.id.toString(),
      status: 'new',
      created_at: new Date().toISOString()
    };
    const res = await fetch(`${SUPA_URL}/rest/v1/Bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }, body: JSON.stringify(data) });
    if(res.ok) {
      bookedProfessionals[provider.id] = { bookedAt: new Date().toISOString(), phone: provider.phone };
      localStorage.setItem('velora_booked', JSON.stringify(bookedProfessionals));
      document.getElementById('quickResult').innerHTML = `<div class="booking-success-reveal"><h4>✓ Booking Successful!</h4><div class="phone-number">${provider.phone || '+20 123 456 7890'}</div><button onclick="closeQuickBookingModalAndReveal(${provider.id},'${provider.phone}')">Close & Reveal</button></div>`;
      document.getElementById('quickForm').style.display = 'none';
    } else alert('Error');
  } catch(e) { alert('Connection error'); }
  finally { btn.disabled = false; }
}

function closeQuickBookingModalAndReveal(id, phone) {

      email: document.getElementById('j-email').value,
      phone: document.getElementById('j-phone').value,
      phone_number: document.getElementById('j-professional-phone').value,
      service_type: document.getElementById('j-service').value,
      services: services,
      locations: locations,
      price: parseInt(document.getElementById('j-price').value) || 0,
      bio: document.getElementById('j-bio').value,
      portfolio_link: document.getElementById('j-portfolio').value,
      status: 'pending',
      created_at: new Date().toISOString()
    };
    const res = await fetch(`${SUPA_URL}/rest/v1/Applications`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }, body: JSON.stringify(data) });
    if(res.ok) { document.getElementById('join-success').classList.add('show'); document.getElementById('join-form').reset(); setTimeout(()=>document.getElementById('join-success').classList.remove('show'),5000); }
    else if(res.status===409) alert('Email already registered');
    else alert('Error');
  } catch(e) { alert('Connection error'); }
  finally { btn.disabled = false; btn.innerHTML = '<span>Submit Application</span>'; }
}

function submitContact(e) {
  e.preventDefault();
  window.location.href = `mailto:hello@velora.studio?subject=VELORA Inquiry`;
  document.getElementById('contact-success').classList.add('show');
  setTimeout(()=>document.getElementById('contact-success').classList.remove('show'),5000);
}

// ========== NAVIGATION ==========
function navigateTo(page) {
  const homeSections = ['home-hero','categories-section','howitworks-section','providers-section','occasions-section','trust-section','testimonials-section','provider-cta-section','pricing-section'];
  const pages = { book:'page-book', join:'page-join', terms:'page-terms', contact:'page-contact' };
  homeSections.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });
  Object.values(pages).forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });
  if(page === 'home') homeSections.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'block'; });
  else { const el = document.getElementById(pages[page]); if(el) el.style.display = 'block'; }
  window.scrollTo({top:0});
}

function switchHiwTab(tab) {
  const cust = document.getElementById('hiw-customer-pane');
  const prof = document.getElementById('hiw-professional-pane');
  const custTab = document.querySelectorAll('.hiw-tab')[0];
  const profTab = document.querySelectorAll('.hiw-tab')[1];
  if(tab === 'customer') { cust.classList.add('active'); prof.classList.remove('active'); custTab.classList.add('active'); profTab.classList.remove('active'); }
  else { cust.classList.remove('active'); prof.classList.add('active'); custTab.classList.remove('active'); profTab.classList.add('active'); }
}

function filterByCategory(cat) { filterProviders(cat); navigateTo('providers'); }

let testimonialIndex = 0;
function slideTestimonial(dir) {
  const track = document.getElementById('testimonial-track');
  if(!track) return;
  const cards = track.children;
  testimonialIndex = Math.max(0, Math.min(cards.length-3, testimonialIndex + dir));
  track.style.transform = `translateX(-${testimonialIndex * (cards[0]?.offsetWidth + 32 || 350)}px)`;
}

function toggleLanguage() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('velora_lang', currentLang);
  applyLanguage();
}

function applyLanguage() {
  const html = document.documentElement;
  html.setAttribute('lang', currentLang);
  html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
  document.getElementById('lang-btn').innerHTML = currentLang === 'en' ? '🇪🇬 العربية' : 'English';
  const texts = {
    'nav-home': currentLang==='ar'?'الرئيسية':'Home', 'nav-providers':currentLang==='ar'?'المحترفون':'Professionals', 'nav-book':currentLang==='ar'?'احجز':'Book', 'nav-join':currentLang==='ar'?'انضم':'Join Us', 'nav-terms':currentLang==='ar'?'الشروط':'Terms', 'nav-contact':currentLang==='ar'?'اتصل':'Contact',
    'hero-badge':currentLang==='ar'?'✨ أكبر منصة في مصر ✨':'✨ Egypt\'s Premier Marketplace ✨', 'hero-title':currentLang==='ar'?'ابحث عن المحترف المثالي':'Find Your Perfect Professional', 'hero-desc':currentLang==='ar'?'تصفح وقارن وتواصل مع أفضل المحترفين':'Browse and contact top professionals', 'hero-browse':currentLang==='ar'?'تصفح المحترفين':'Browse', 'hero-book':currentLang==='ar'?'احجز فعاليتك':'Book'
  };
  Object.keys(texts).forEach(key => { const el = document.querySelector(`[data-key="${key}"]`); if(el) el.innerHTML = texts[key]; });
  renderFilters();
  renderProviders();
}

function openMobileMenu() { document.getElementById('mobile-menu').classList.add('open'); }
function closeMobileMenu() { document.getElementById('mobile-menu').classList.remove('open'); }

// ========== INITIALIZATION ==========
function init() {
  loadProvidersFromSupabase();
  renderCategories();
  renderOccasions();
  renderPlans();
  renderIncludedList();
  renderCustomerSteps();
  renderProfessionalSteps();
  renderTerms();
  initCheckboxGroups();
  applyLanguage();
  setInterval(() => slideTestimonial(1), 8000);
  window.addEventListener('scroll', () => { const navbar = document.getElementById('navbar'); if(window.scrollY>50) navbar.classList.add('solid'); else navbar.classList.remove('solid'); });
  document.getElementById('booking-form')?.addEventListener('submit', submitBooking);
  document.getElementById('join-form')?.addEventListener('submit', submitJoin);
  document.getElementById('contact-form')?.addEventListener('submit', submitContact);
  navigateTo('home');
}
init();
</script>
